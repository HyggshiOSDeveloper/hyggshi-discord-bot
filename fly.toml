# fly.toml app configuration file
# Generated for hyggshi-discord-bot

app = "hyggshi-discord-bot"
primary_region = "sin"  # Singapore - closest to Vietnam

# Build configuration
[build]
  # Let Fly auto-detect Node.js and use package.json

# Deploy configuration
[deploy]
  strategy = "immediate"

# Environment variables (non-sensitive)
[env]
  NODE_ENV = "production"

# Experimental: keep bot process running
[experimental]
  auto_rollback = true

# VM configuration - Free tier
[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1

# HTTP service configuration
# Keep bot running 24/7 without auto-stop
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1
  max_machines_running = 1

  # Concurrency settings
  [[http_service.concurrency]]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  # Health check (optional - if bot has HTTP endpoint)
  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "30s"
    method = "GET"
    path = "/health"
